# Credential file read patterns.
#
# Matched against tool_call inputs in the LLM response. Each rule
# represents a known way an agent's tool execution would expose
# secrets to a remote endpoint or to disk in a way that simplifies
# attacker pickup.
#
# Severity convention:
#   critical = key material or live credentials directly read
#   high     = credential file accessed in a way only meaningful to
#              an attacker
#   medium   = credential surface adjacent (env dump, browser store)

rules:
  - id: relix.cred.read-ssh-private-key
    name: shell command reads SSH private key
    description: |
      Any tool call that cats, reads, or uploads an SSH private key
      file is highly suspicious in an AI-coding-agent context.
    severity: critical
    action: block
    tags: [credential-exfiltration, ssh]
    references:
      - https://attack.mitre.org/techniques/T1552/004/
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(\\.ssh/id_(rsa|ed25519|ecdsa|dsa)|\\.ssh/identity)"

  - id: relix.cred.read-aws-credentials
    name: shell command reads AWS credentials file
    description: |
      ~/.aws/credentials carries long-lived static IAM keys. Any
      read of this file by a tool call is treated as exfiltration.
    severity: critical
    action: block
    tags: [credential-exfiltration, aws]
    references:
      - https://attack.mitre.org/techniques/T1552/001/
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "\\.aws/credentials"

  - id: relix.cred.read-gcp-credentials
    name: shell command reads GCP application default credentials
    description: |
      ~/.config/gcloud/application_default_credentials.json carries
      a refreshable GCP credential. Same threat as AWS keys.
    severity: critical
    action: block
    tags: [credential-exfiltration, gcp]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "application_default_credentials\\.json"

  - id: relix.cred.read-kubeconfig
    name: shell command reads kubeconfig
    description: |
      Kubeconfig grants cluster access via embedded tokens or
      certificate material. Reading it is rarely needed by an
      AI coding agent.
    severity: high
    action: block
    tags: [credential-exfiltration, kubernetes]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(\\.kube/config|KUBECONFIG=)"

  - id: relix.cred.read-docker-config
    name: shell command reads docker config
    description: |
      ~/.docker/config.json holds registry login tokens. Any read
      is treated as exfiltration.
    severity: high
    action: block
    tags: [credential-exfiltration, docker]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "\\.docker/config\\.json"

  - id: relix.cred.read-netrc
    name: shell command reads ~/.netrc
    description: |
      ~/.netrc carries plaintext credentials for ftp, smtp, and
      git over https.
    severity: high
    action: block
    tags: [credential-exfiltration]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(\\.netrc|/_netrc)"

  - id: relix.cred.read-pgpass
    name: shell command reads ~/.pgpass
    description: |
      PostgreSQL password file. Read attempts in an agent context
      are almost never legitimate.
    severity: high
    action: block
    tags: [credential-exfiltration, database]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "\\.pgpass"

  - id: relix.cred.read-gh-token-config
    name: shell command reads gh CLI token store
    description: |
      The GitHub CLI persists OAuth tokens at ~/.config/gh/hosts.yml.
      The bare GITHUB_TOKEN / GH_TOKEN env reads are also flagged
      as the exfiltration adjacent surface.
    severity: high
    action: block
    tags: [credential-exfiltration, github]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(\\.config/gh/hosts\\.yml|GITHUB_TOKEN=|GH_TOKEN=)"

  - id: relix.cred.read-shadow
    name: shell command reads /etc/shadow
    description: |
      /etc/shadow contains password hashes. Read attempts indicate
      an attempted offline cracking pipeline.
    severity: critical
    action: block
    tags: [credential-exfiltration, privilege-escalation]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "/etc/shadow(\\s|$|;|&)"

  - id: relix.cred.read-keyring-secrets
    name: shell command reads gnome / kwallet keyring secrets
    description: |
      Direct reads of seahorse, kwallet, or libsecret stores
      bypass the user UI consent flow.
    severity: high
    action: block
    tags: [credential-exfiltration, keyring]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(\\.local/share/keyrings|\\.kde/share/apps/kwallet|secret-tool\\s+search)"

  - id: relix.cred.dump-env
    name: shell command dumps full process environment
    description: |
      Wholesale env dumps are a common precursor to exfiltrating
      whatever credentials the parent shell exposes.
    severity: medium
    action: block
    tags: [credential-exfiltration, environment]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(^|\\s|;|&|\\|)(env|printenv)(\\s|$|;|&|\\|)"

  - id: relix.cred.read-dotenv
    name: shell command reads .env file
    description: |
      .env files commonly carry production secrets in dev
      workflows.
    severity: high
    action: block
    tags: [credential-exfiltration, environment]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(^|\\s|/)\\.env(\\.|\\s|$)"

  - id: relix.cred.read-firefox-keys
    name: shell command reads Firefox saved logins
    description: |
      Firefox stores its saved logins in logins.json + key4.db.
    severity: high
    action: block
    tags: [credential-exfiltration, browser]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(logins\\.json|key4\\.db|key3\\.db)"

  - id: relix.cred.read-chrome-profile
    name: shell command reads Chrome login data
    description: |
      Chrome's Login Data SQLite file carries saved passwords;
      key material is in Local State.
    severity: high
    action: block
    tags: [credential-exfiltration, browser]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "(google-chrome/.*Login Data|Chromium/.*Login Data|Local State\\b)"

  - id: relix.cred.read-azure-tokens
    name: shell command reads Azure CLI token cache
    description: |
      ~/.azure/accessTokens.json carries refreshable Azure tokens.
    severity: critical
    action: block
    tags: [credential-exfiltration, azure]
    matcher:
      kind: tool_input_regex
      name: Bash
      pattern: "\\.azure/(accessTokens\\.json|msal_token_cache)"
